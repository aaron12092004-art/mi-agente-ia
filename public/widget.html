<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Widget</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #D4AF37;
    --gold-light: #F0D060;
    --dark: #0d0d1a;
    --dark2: #13132a;
    --dark3: #1a1a35;
    --dark4: #22224a;
    --text: #e8e8f0;
    --text-dim: #9090b0;
    --green: #2ecc71;
    --border: rgba(212,175,55,0.2);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: transparent;
    overflow: hidden;
  }

  /* ===== WIDGET CONTAINER ===== */
  #widget-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  /* ===== CHAT WINDOW ===== */
  #chat-window {
    width: 380px;
    height: 560px;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.1);
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: bottom right;
  }

  #chat-window.hidden {
    opacity: 0;
    transform: scale(0.8) translateY(20px);
    pointer-events: none;
  }

  /* ===== HEADER ===== */
  .chat-header {
    background: linear-gradient(135deg, var(--dark3) 0%, var(--dark4) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .agent-avatar {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--gold) 0%, #8B6914 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    position: relative;
  }

  .online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 10px;
    height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid var(--dark3);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.1); }
  }

  .agent-info { flex: 1; }
  .agent-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .agent-status { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 4px; }

  .header-actions { display: flex; gap: 6px; }
  .header-btn {
    width: 30px;
    height: 30px;
    border: none;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* ===== MESSAGES ===== */
  #messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #messages-area::-webkit-scrollbar { width: 4px; }
  #messages-area::-webkit-scrollbar-track { background: transparent; }
  #messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message-group { display: flex; flex-direction: column; gap: 4px; }
  .message-group.user { align-items: flex-end; }
  .message-group.assistant { align-items: flex-start; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .msg-icon.assistant { background: linear-gradient(135deg, var(--gold) 0%, #8B6914 100%); }
  .msg-icon.user { background: var(--dark4); }

  .bubble {
    max-width: 260px;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.55;
    word-wrap: break-word;
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--gold) 0%, #B8960A 100%);
    color: var(--dark);
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  .bubble.assistant {
    background: var(--dark3);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time { font-size: 10px; color: var(--text-dim); padding: 0 4px; }

  /* ===== TYPING INDICATOR ===== */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .typing-dots {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ===== QUICK REPLIES ===== */
  #quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .quick-reply-btn {
    padding: 6px 12px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--gold);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .quick-reply-btn:hover {
    background: var(--gold);
    color: var(--dark);
    border-color: var(--gold);
  }

  /* ===== EMAIL CAPTURE FORM ===== */
  #email-capture {
    padding: 14px 16px;
    background: var(--dark3);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: none;
  }

  .email-capture-title {
    font-size: 12px;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .email-input-row {
    display: flex;
    gap: 8px;
  }

  .email-input-row input {
    flex: 1;
    background: var(--dark4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .email-input-row input:focus { border-color: var(--gold); }
  .email-input-row input::placeholder { color: var(--text-dim); }

  .email-submit-btn {
    padding: 8px 14px;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: var(--dark);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .email-submit-btn:hover { background: var(--gold-light); }

  /* ===== INPUT AREA ===== */
  .chat-input-area {
    padding: 14px 16px;
    background: var(--dark2);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13.5px;
    outline: none;
    resize: none;
    max-height: 100px;
    min-height: 42px;
    line-height: 1.4;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  #message-input:focus { border-color: var(--gold); }
  #message-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--gold) 0%, #B8960A 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== FAB BUTTON ===== */
  #fab-btn {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, var(--gold) 0%, #8B6914 100%);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 8px 24px rgba(212,175,55,0.4);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }
  #fab-btn:hover { transform: scale(1.1); box-shadow: 0 12px 32px rgba(212,175,55,0.5); }
  #fab-btn:active { transform: scale(0.95); }

  #fab-notification {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 18px;
    height: 18px;
    background: #e74c3c;
    border-radius: 50%;
    border: 2px solid var(--dark2);
    font-size: 10px;
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* ===== ESCALATION BANNER ===== */
  #escalation-banner {
    background: linear-gradient(135deg, rgba(231,76,60,0.15), rgba(231,76,60,0.05));
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin: 8px 16px;
    font-size: 12px;
    color: #f0a0a0;
    display: none;
  }

  /* ===== BRANDING ===== */
  .chat-branding {
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .chat-branding a { color: var(--gold); text-decoration: none; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 440px) {
    #widget-container { bottom: 0; right: 0; left: 0; }
    #chat-window {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
    }
    #fab-btn { right: 16px; bottom: 16px; position: fixed; }
  }
</style>
</head>
<body>

<div id="widget-container">

  <!-- CHAT WINDOW -->
  <div id="chat-window" class="hidden">

    <!-- HEADER -->
    <div class="chat-header">
      <div class="agent-avatar">
        <span id="header-avatar">🤖</span>
        <div class="online-dot"></div>
      </div>
      <div class="agent-info">
        <div class="agent-name" id="header-name">Luna</div>
        <div class="agent-status">● En línea — responde al instante</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="minimizeChat()" title="Minimizar">—</button>
      </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages-area"></div>

    <!-- TYPING -->
    <div class="typing-indicator" id="typing" style="display:none;padding:0 16px 8px">
      <div class="msg-icon assistant" id="typing-icon">🤖</div>
      <div class="typing-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- ESCALATION BANNER -->
    <div id="escalation-banner">
      🔔 Un agente humano te va a contactar pronto. Dejanos tu email para que pueda escribirte.
    </div>

    <!-- QUICK REPLIES -->
    <div id="quick-replies"></div>

    <!-- EMAIL CAPTURE -->
    <div id="email-capture">
      <div class="email-capture-title">📧 Dejá tu email y te contactamos</div>
      <div class="email-input-row">
        <input type="email" id="email-input" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')submitEmail()">
        <button class="email-submit-btn" onclick="submitEmail()">✓</button>
      </div>
    </div>

    <!-- INPUT -->
    <div class="chat-input-area">
      <textarea
        id="message-input"
        placeholder="Escribí tu mensaje..."
        rows="1"
        onkeydown="handleKeyDown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <!-- BRANDING -->
    <div class="chat-branding">
      Desarrollado por <strong>Aaron Rodriguez</strong>
    </div>
  </div>

  <!-- FAB BUTTON -->
  <button id="fab-btn" onclick="toggleChat()">
    <span id="fab-icon">💬</span>
    <div id="fab-notification">1</div>
  </button>

</div>

<script>
// ============================================================
// WIDGET JAVASCRIPT — Agente IA
// ============================================================

const SERVER_URL = window.location.origin;
let conversationId = null;
let isOpen = false;
let config = {};
let messageCount = 0;
let emailCaptured = false;
let quickRepliesShown = true;

// ---- INIT ----
async function initWidget() {
  try {
    config = await fetch(`${SERVER_URL}/api/config`).then(r => r.json());
    applyConfig();
    addWelcomeMessage();
    showQuickReplies();
  } catch (e) {
    console.error('Widget init error:', e);
    addWelcomeMessage();
  }
}

function applyConfig() {
  const agent = config.agent || {};
  const widget = config.widget || {};

  // Apply agent name and avatar
  document.getElementById('header-name').textContent = agent.name || 'Luna';
  document.getElementById('header-avatar').textContent = agent.avatar || '🤖';
  document.getElementById('typing-icon').textContent = agent.avatar || '🤖';
  document.getElementById('fab-icon').textContent = agent.avatar || '💬';

  // Apply colors
  if (widget.primaryColor) {
    document.documentElement.style.setProperty('--gold', widget.primaryColor);
  }
  if (widget.secondaryColor) {
    document.documentElement.style.setProperty('--dark', widget.secondaryColor);
  }

  // Position
  const container = document.getElementById('widget-container');
  if (widget.position === 'bottom-left') {
    container.style.right = 'auto';
    container.style.left = '24px';
    container.style.alignItems = 'flex-start';
    document.getElementById('chat-window').style.transformOrigin = 'bottom left';
  }

  // Auto-open
  if (widget.showOnLoad !== false) {
    setTimeout(openChat, 800);
  }
}

function addWelcomeMessage() {
  const greeting = config.agent?.greeting || '¡Hola! Soy tu asistente virtual. ¿En qué puedo ayudarte hoy?';
  addMessage('assistant', greeting);
}

function showQuickReplies() {
  const qrContainer = document.getElementById('quick-replies');
  const replies = config.quickReplies || ['Ver precios 💰', 'Agendar consulta 📅', 'Ver FAQ ❓', 'Hablar con humano 👤'];

  if (replies.length > 0) {
    qrContainer.innerHTML = replies.map(r =>
      `<button class="quick-reply-btn" onclick="sendQuickReply('${r.replace(/'/g,"\\'")}')">
        ${r}
      </button>`
    ).join('');
  }
}

// ---- TOGGLE ----
function toggleChat() {
  if (isOpen) minimizeChat();
  else openChat();
}

function openChat() {
  isOpen = true;
  const win = document.getElementById('chat-window');
  win.classList.remove('hidden');
  document.getElementById('fab-icon').textContent = '✕';
  document.getElementById('fab-notification').style.display = 'none';
  setTimeout(() => document.getElementById('message-input').focus(), 350);
  scrollToBottom();
}

function minimizeChat() {
  isOpen = false;
  const win = document.getElementById('chat-window');
  win.classList.add('hidden');
  document.getElementById('fab-icon').textContent = config.agent?.avatar || '💬';
}

// ---- MESSAGES ----
function addMessage(role, text, animate = true) {
  const area = document.getElementById('messages-area');
  const isUser = role === 'user';

  const div = document.createElement('div');
  div.className = `message-group ${role}`;

  const iconEmoji = isUser ? '👤' : (config.agent?.avatar || '🤖');
  const now = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });

  div.innerHTML = `
    <div class="msg-row ${role}">
      ${!isUser ? `<div class="msg-icon assistant">${iconEmoji}</div>` : ''}
      <div class="bubble ${role}">${formatText(text)}</div>
      ${isUser ? `<div class="msg-icon user">👤</div>` : ''}
    </div>
    <div class="msg-time">${now}</div>
  `;

  if (animate) {
    div.style.opacity = '0';
    div.style.transform = `translateY(8px)`;
    div.style.transition = 'all 0.25s ease';
  }

  area.appendChild(div);

  if (animate) {
    requestAnimationFrame(() => {
      div.style.opacity = '1';
      div.style.transform = 'translateY(0)';
    });
  }

  scrollToBottom();
  messageCount++;

  // Show email capture after 3 messages if not captured
  if (!emailCaptured && messageCount >= 3) {
    showEmailCapture();
  }

  // Show notification on FAB if minimized
  if (!isOpen) {
    const notif = document.getElementById('fab-notification');
    notif.style.display = 'flex';
  }
}

function formatText(text) {
  // Basic markdown-lite formatting
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--gold)">$1</a>');
}

function scrollToBottom() {
  const area = document.getElementById('messages-area');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

// ---- SEND ----
async function sendMessage(text) {
  const input = document.getElementById('message-input');
  const msgText = text || input.value.trim();
  if (!msgText) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  // Hide quick replies after first message
  if (quickRepliesShown) {
    document.getElementById('quick-replies').innerHTML = '';
    quickRepliesShown = false;
  }

  addMessage('user', msgText);
  showTyping(true);

  try {
    const res = await fetch(`${SERVER_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msgText,
        conversationId,
        channel: 'web',
      }),
    });

    const data = await res.json();
    conversationId = data.conversationId;

    showTyping(false);
    addMessage('assistant', data.message);

    // Handle escalation
    if (data.escalated) {
      document.getElementById('escalation-banner').style.display = 'block';
      showEmailCapture();
    }

  } catch (err) {
    showTyping(false);
    addMessage('assistant', 'Lo siento, tuve un problema técnico. Por favor intentá de nuevo. 🙏');
    console.error('Chat error:', err);
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('message-input').focus();
}

function sendQuickReply(text) {
  document.getElementById('quick-replies').innerHTML = '';
  quickRepliesShown = false;
  sendMessage(text);
}

// ---- EMAIL CAPTURE ----
function showEmailCapture() {
  if (!emailCaptured) {
    document.getElementById('email-capture').style.display = 'block';
  }
}

async function submitEmail() {
  const emailInput = document.getElementById('email-input');
  const email = emailInput.value.trim();
  if (!email || !email.includes('@')) {
    emailInput.style.borderColor = '#e74c3c';
    return;
  }

  emailCaptured = true;
  document.getElementById('email-capture').style.display = 'none';
  document.getElementById('escalation-banner').style.display = 'none';

  // Save lead
  await fetch(`${SERVER_URL}/api/leads`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, source: 'chat-widget', conversationId }),
  }).catch(() => {});

  addMessage('assistant', `✅ ¡Perfecto! Registré tu email (${email}). Uno de nuestros agentes te va a contactar pronto. ¿Hay algo más en lo que pueda ayudarte?`);
}

// ---- TYPING ----
function showTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  if (show) scrollToBottom();
}

// ---- KEYBOARD ----
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ---- START ----
initWidget();
</script>
</body>
</html>
